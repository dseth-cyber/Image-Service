global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "image-api"
    scrape_interval: 15s
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["image-api:3001"]

  - job_name: "image-processing-worker"
    scrape_interval: 30s
    metrics_path: /health
    static_configs:
      - targets: ["image-processing-worker:9200"]
